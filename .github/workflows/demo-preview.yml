name: Demo Preview

on:
  pull_request:

jobs:
  deploy-demo:
    name: Build & Deploy Docs + Frontend Demo
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for client directory
        id: check-client
        run: |
          if [ -d "client" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.check-client.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        if: steps.check-client.outputs.exists == 'true'
        run: npm ci
        working-directory: client

      - name: Build client in demo mode
        if: steps.check-client.outputs.exists == 'true'
        run: npm run build -- --base /demo/
        working-directory: client
        env:
          VITE_DEMO_MODE: "true"

      - name: Copy demo build into Hugo static directory
        if: steps.check-client.outputs.exists == 'true'
        run: mkdir -p site/static/demo && cp -r client/dist/. site/static/demo/

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Build documentation site (includes demo at /demo/)
        run: make site-build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: dev-console
          directory: site/public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

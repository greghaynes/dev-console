<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Dev Console</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 1rem 0;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin: 0 0 0.5rem 0;
    }
    .subheading {
      font-size: 1.25rem;
      color: #94a3b8;
      margin: 0 0 2rem 0;
    }
    a.signin-btn {
      display: inline-block;
      background: #2563eb;
      color: #ffffff;
      text-decoration: none;
      padding: 0.625rem 1.25rem;
      border-radius: 0.375rem;
      font-size: 1rem;
      font-weight: 600;
    }
    a.signin-btn:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Dev Console</h1>
    <p class="subheading">Sign in to continue</p>
    <a class="signin-btn" href="/auth/login">Sign in with GitHub</a>
  </div>
</body>
</html>

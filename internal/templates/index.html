<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dev Console</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 1rem 0;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin: 0 0 0.5rem 0;
    }
    .subheading {
      font-size: 1.25rem;
      color: #94a3b8;
      margin: 0 0 2rem 0;
    }
    .field {
      margin-bottom: 0.75rem;
      font-size: 1rem;
    }
    .label {
      color: #94a3b8;
    }
    .value {
      color: #f1f5f9;
    }
    form {
      margin-top: 1.5rem;
    }
    button {
      background: #2563eb;
      color: #ffffff;
      border: none;
      padding: 0.625rem 1.25rem;
      border-radius: 0.375rem;
      cursor: pointer;
      font-family: system-ui, sans-serif;
      font-size: 1rem;
      font-weight: 600;
    }
    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Dev Console</h1>
    <p class="subheading">Signed in</p>
    <div class="field">
      <span class="label">Login: </span><span class="value">{{.Login}}</span>
    </div>
    <div class="field">
      <span class="label">ID: </span><span class="value">{{.ID}}</span>
    </div>
    <form method="POST" action="/auth/logout">
      <button type="submit">Sign out</button>
    </form>
  </div>
</body>
</html>

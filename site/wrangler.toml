# Cloudflare Workers configuration for the Dev Console documentation site.
#
# Prerequisites:
#   npm install -g wrangler          # install the Wrangler CLI
#   wrangler login                   # authenticate with your Cloudflare account
#
# Build and deploy:
#   hugo --minify                    # build the static site into ./public
#   wrangler deploy                  # upload assets and deploy the Worker

name = "dev-console-site"
compatibility_date = "2024-09-25"

# Serve the Hugo-generated static files as Workers Static Assets.
[assets]
directory = "./public"

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} – {{ .Site.Title }}{{ end }}</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 900px; margin: 0 auto; padding: 1rem 2rem; color: #222; }
    nav { border-bottom: 1px solid #eee; padding-bottom: 0.5rem; margin-bottom: 2rem; }
    nav a { margin-right: 1rem; text-decoration: none; color: #0070f3; }
    nav a:hover { text-decoration: underline; }
    h1, h2, h3 { line-height: 1.3; }
    pre { background: #f6f8fa; border: 1px solid #e1e4e8; border-radius: 4px; padding: 1rem; overflow-x: auto; }
    code { font-family: ui-monospace, monospace; font-size: 0.9em; background: #f6f8fa; padding: 0.1em 0.3em; border-radius: 3px; }
    pre code { background: none; padding: 0; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #e1e4e8; padding: 0.4rem 0.8rem; text-align: left; }
    th { background: #f6f8fa; }
    a { color: #0070f3; }
  </style>
</head>
<body>
  <nav>
    <a href="{{ "/" | relURL }}">Home</a>
    <a href="{{ "/docs/design/" | relURL }}">Design</a>
    <a href="{{ "/docs/plan/" | relURL }}">Plan</a>
    <a href="{{ "/docs/wireframes/" | relURL }}">Wireframes</a>
  </nav>
  <main>
    {{- block "main" . }}{{- end }}
  </main>
</body>
</html>
